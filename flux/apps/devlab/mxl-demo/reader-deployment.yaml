---
# MXL Reader – RoCEv2 cross-node deployment
#
# Target-info discovery:
#   1. reader-container runs mxl-fabrics-demo, prints "Target info: <base64>" to stdout
#   2. Extracted and written to /target-info/target-info.txt (emptyDir)
#   3. target-info-server sidecar (busybox httpd) serves it on port 8080
#   4. Writer polls http://reader-fabrics-svc:8080/target-info.txt until available
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reader-media-function
  namespace: mxl-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: reader-media-function
  template:
    metadata:
      labels:
        app: reader-media-function
      annotations:
        # Secondary NIC on VLAN 292 — unique IP allocated by whereabouts
        k8s.v1.cni.cncf.io/networks: network/rdma-roce
    spec:
      # Reader and writer must land on different nodes for cross-node RDMA.
      hostNetwork: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - writer-media-function
              topologyKey: kubernetes.io/hostname

      containers:
        - name: reader-container
          image: oci.clsn.dev/mxl-reader:cx4-rdma
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add: [IPC_LOCK, SYS_RESOURCE]
          env:
            - name: FI_VERBS_IFACE
              value: "net1"
            - name: FI_PROVIDER
              value: "verbs"
          command: ["/bin/sh", "-c"]
          args:
            - |
              rm -rf /domain/*
              rm -f /target-info/target-info.txt

              ulimit -l unlimited || true

              NODE_IP=$(awk '/\|--/{ip=$2} /\/32 host LOCAL/{print ip}' /proc/net/fib_trie | grep -v '^127\.' | grep -v '^10\.244\.' | sort -u | head -1)
              echo "RDMA node IP: $NODE_IP"

              FABRICS_LOG=/tmp/fabrics-demo.log
              /usr/bin/mxl-fabrics-demo -d /domain -f /usr/share/mxl/data/v210_flow.json -p verbs --node "$NODE_IP" > "$FABRICS_LOG" 2>&1 &
              FABRICS_PID=$!

              echo "Waiting for fabrics target to produce target-info..."
              while ! grep -q "Target info:" "$FABRICS_LOG" 2>/dev/null; do
                if ! kill -0 $FABRICS_PID 2>/dev/null; then
                  echo "ERROR: mxl-fabrics-demo exited prematurely. Output:"
                  cat "$FABRICS_LOG"
                  exit 1
                fi
                sleep 0.5
              done
              cat "$FABRICS_LOG"

              grep "Target info:" "$FABRICS_LOG" | sed 's/.*Target info: //' | tr -d ' \r\n' > /target-info/target-info.txt
              echo "Target info published for discovery"

              echo "Waiting for video flow in /domain..."
              while [ -z "$(ls /domain/ 2>/dev/null | grep '.mxl-flow')" ]; do sleep 0.5; done

              /usr/bin/mxl-gst-sink -d /domain -v 5fbec3b1-1b0f-417d-9059-8b94a47197ed &

              wait $FABRICS_PID

          resources:
            limits:
              rdma/hca_shared_devices: "1"
              memory: "4Gi"
              cpu: "4"
            requests:
              rdma/hca_shared_devices: "1"
              memory: "1Gi"
              cpu: "2"
          tty: true
          stdin: true
          volumeMounts:
            - name: domain-volume
              mountPath: /domain
            - name: target-info
              mountPath: /target-info
            - name: dev-infiniband
              mountPath: /dev/infiniband

        - name: target-info-server
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while [ ! -f /target-info/target-info.txt ]; do sleep 0.5; done
              echo "Serving target-info on port 8080"
              cd /target-info
              httpd -f -p 8080
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "100m"
              memory: "64Mi"
            requests:
              cpu: "10m"
              memory: "16Mi"
          volumeMounts:
            - name: target-info
              mountPath: /target-info
              readOnly: true

      volumes:
        - name: domain-volume
          emptyDir:
            medium: Memory
        - name: target-info
          emptyDir: {}
        - name: dev-infiniband
          hostPath:
            path: /dev/infiniband
