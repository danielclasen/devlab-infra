---
# NodePort access to the mediamtx sidecar inside the reader pod.
# Without metallb each protocol is reachable as <any-node-ip>:<nodePort>.
apiVersion: v1
kind: Service
metadata:
  name: mediamtx-svc
  namespace: mxl-demo
spec:
  type: NodePort
  selector:
    app: reader-media-function
  ports:
    - name: rtsp
      port: 8554
      targetPort: 8554
      protocol: TCP
    - name: rtmp
      port: 1935
      targetPort: 1935
      protocol: TCP
    - name: hls
      port: 8888
      targetPort: 8888
      protocol: TCP
    - name: webrtc-http
      port: 8889
      targetPort: 8889
      protocol: TCP
    - name: webrtc-ice
      port: 8189
      targetPort: 8189
      protocol: UDP
    - name: srt
      port: 8890
      targetPort: 8890
      protocol: UDP
