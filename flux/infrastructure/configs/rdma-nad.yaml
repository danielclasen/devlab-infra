---
apiVersion: v1
kind: Namespace
metadata:
  name: network
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: rdma-roce
  namespace: network
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "rdma-roce",
      "type": "macvlan",
      "master": "bond1.292",
      "mode": "bridge",
      "mtu": 9000,
      "ipam": {
        "type": "host-local",
        "subnet": "10.200.92.0/24",
        "rangeStart": "10.200.92.128",
        "rangeEnd": "10.200.92.200",
        "gateway": "10.200.92.1"
      }
    }
