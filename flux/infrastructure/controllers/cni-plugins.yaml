---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cni-plugins
  namespace: kube-system
  labels:
    app: cni-plugins
spec:
  selector:
    matchLabels:
      app: cni-plugins
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: cni-plugins
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      initContainers:
        - name: install-cni-plugins
          image: ghcr.io/containernetworking/plugins:v1.6.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              cp /opt/cni/bin/* /host/opt/cni/bin/
              echo "CNI plugins installed:"
              ls /host/opt/cni/bin/
          securityContext:
            privileged: true
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 8Mi
      volumes:
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
