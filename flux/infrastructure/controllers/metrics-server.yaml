---
apiVersion: v1
kind: Namespace
metadata:
  name: metrics-server
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metrics-server
  namespace: metrics-server
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/metrics-server/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: metrics-server
spec:
  interval: 12h
  chart:
    spec:
      chart: metrics-server
      version: ">=0.7.0"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
      interval: 24h
  values:
    args:
      - --kubelet-preferred-address-types=InternalIP
      - --kubelet-insecure-tls
