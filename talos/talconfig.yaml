          - vlanId: 292
            dhcp: false
            mtu: 9000
            addresses:
              - "10.200.92.14/24"
patches:
  - "@./patches/000-kubelet-patch.yaml"
  - "@./patches/001-timesync-ntp.yaml"
controlPlane:
  kernelModules:
    - name: drbd
      parameters:
        - usermode_helper=disabled
    - name: drbd_transport_tcp
    - name: dm-thin-pool
    - name: mlx5_ib
    - name: ib_uverbs
    - name: rdma_cm
  patches:
    - "@./patches/controlPlane/000-metrics-listen-patch.yaml"
    - "@./patches/controlPlane/001-roce-sysctls.yaml"
